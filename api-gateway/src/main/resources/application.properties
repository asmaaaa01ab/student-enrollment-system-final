spring.application.name=api-gateway
server.port=8080
# Routes Gateway
spring.cloud.gateway.routes[0].id=auth-register
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=student-service
spring.cloud.gateway.routes[1].uri=lb://student-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/students/**
spring.cloud.gateway.routes[1].filters[0].name=JwtAuthFilter

spring.cloud.gateway.routes[2].id=course-service
spring.cloud.gateway.routes[2].uri=lb://course-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/courses/**
spring.cloud.gateway.routes[2].filters[0].name=JwtAuthFilter

spring.cloud.gateway.routes[3].id=enrollment-service
spring.cloud.gateway.routes[3].uri=lb://enrollment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/enrollments/**
spring.cloud.gateway.routes[3].filters[0].name=JwtAuthFilter
# CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:8084
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# JWT Secret
jwt.secret=myVerySecretKeyForJWTSigningThatIsAtLeast256BitsLong