<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Erreur serveur — 500</title>
	<link rel="stylesheet" th:href="@{/css/errors.css}">
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 error-box text-center">
            <div class="error-code">500</div>
            <h2 class="mt-2 mb-3">Erreur interne du serveur</h2>
            <p class="text-muted" th:text="${message}">
                Une erreur inattendue s'est produite. Veuillez réessayer plus tard.
            </p>
            <hr>
            <a th:href="@{/login}" class="btn btn-outline-secondary">
                 Se connecter
            </a>
        </div>
    </div>
</div>
</body>
</html>
